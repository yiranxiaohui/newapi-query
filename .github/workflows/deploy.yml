name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: echo "${{ secrets.HARBOR_PASSWORD }}" | docker login harbor.yunnet.top -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin

      - run: |
          docker build -t harbor.yunnet.top/all/newapi-query:latest .
          docker push harbor.yunnet.top/all/newapi-query:latest
